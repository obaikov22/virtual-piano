<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Virtual Piano</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0f; --surface:#0d1117; --border:#1c2333;
  --gold:#e8c97a; --blue:#7ab8e8; --green:#7ae8b8;
  --red:#e87a7a; --text:#c8d4e8; --dim:#3a4a60;
}
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ width:100%; height:100%; background:var(--bg); color:var(--text);
  font-family:'DM Mono',monospace; overflow:hidden; touch-action:none; }

/* ── INTRO ── */
#intro{ position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:100; background:var(--bg); }
.i-tag{ font-size:10px; letter-spacing:5px; color:var(--dim); margin-bottom:16px;
  animation:fu .5s .1s both; }
.i-title{ font-family:'Syncopate',sans-serif; font-size:clamp(36px,10vw,72px);
  font-weight:700; color:var(--gold); text-shadow:0 0 60px rgba(232,201,122,.2);
  margin-bottom:6px; animation:fu .5s .2s both; }
.i-sub{ font-size:11px; letter-spacing:3px; color:var(--dim); margin-bottom:40px;
  animation:fu .5s .3s both; }
.i-tips{ font-size:12px; color:var(--dim); line-height:2.2; text-align:center;
  margin-bottom:40px; animation:fu .5s .4s both; }
.i-tips b{ color:var(--gold); font-weight:400; }
.btn{ padding:14px 44px; background:transparent; border:1px solid var(--gold);
  color:var(--gold); font-family:'Syncopate',sans-serif; font-size:11px;
  letter-spacing:4px; cursor:pointer; position:relative; overflow:hidden;
  transition:color .25s; -webkit-appearance:none; animation:fu .5s .5s both; }
.btn::before{ content:''; position:absolute; inset:0; background:var(--gold);
  transform:scaleX(0); transform-origin:left; transition:transform .25s; z-index:-1; }
.btn:active::before{ transform:scaleX(1); }
.btn:active{ color:var(--bg); }
@keyframes fu{ from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

/* ── LOADING ── */
#loading{ position:fixed; inset:0; background:var(--bg); display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:200; }
.ld-bar-wrap{ width:200px; height:2px; background:var(--border); }
.ld-bar{ height:100%; background:linear-gradient(90deg,var(--gold),var(--green));
  width:0%; transition:width .3s; box-shadow:0 0 8px var(--gold); }
.ld-txt{ font-size:11px; letter-spacing:2px; color:var(--dim); }

/* ── APP ── */
#app{ position:fixed; inset:0; display:none; flex-direction:column; }

/* Camera */
#cam-wrap{ position:relative; flex:1; overflow:hidden; background:#000; }
#video{ position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; transform:scaleX(-1); }
#canvas{ position:absolute; inset:0; width:100%; height:100%; }

/* HUD */
#hud{ position:absolute; top:0; left:0; right:0; display:flex;
  align-items:center; justify-content:space-between; padding:10px 14px;
  background:linear-gradient(180deg,rgba(8,10,15,.9) 0%,transparent 100%);
  z-index:10; pointer-events:none; }
.hud-title{ font-family:'Syncopate',sans-serif; font-size:11px;
  letter-spacing:3px; color:var(--gold); }
.hud-right{ display:flex; align-items:center; gap:12px; font-size:10px;
  letter-spacing:1px; color:var(--dim); }
.dot{ width:6px; height:6px; border-radius:50%; background:var(--dim); transition:all .3s; }
.dot.on{ background:var(--green); box-shadow:0 0 8px var(--green); }
.dot.sustain{ background:var(--blue); box-shadow:0 0 10px var(--blue);
  animation:pulse-dot 1s infinite; }
@keyframes pulse-dot{ 0%,100%{opacity:1} 50%{opacity:.4} }

/* Note flash */
#note-flash{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-family:'Syncopate',sans-serif; font-size:28px; letter-spacing:6px;
  color:var(--gold); text-shadow:0 0 30px var(--gold); opacity:0;
  transition:opacity .1s; pointer-events:none; z-index:20; }

/* Synthesia falling notes area */
#synth-canvas{ position:absolute; inset:0; width:100%; height:100%;
  pointer-events:none; z-index:5; }

/* ── PIANO ── */
#piano-wrap{ position:relative; height:150px; background:#06080c;
  border-top:1px solid var(--border); flex-shrink:0; overflow:hidden; }
#piano-canvas{ width:100%; height:calc(100% - 40px); display:block; }

/* Octave bar */
#oct-bar{ position:absolute; bottom:0; left:0; right:0; height:40px;
  display:flex; align-items:center; justify-content:center; gap:14px;
  background:rgba(6,8,12,.8); border-top:1px solid var(--border); z-index:5; }
.oct-btn{ width:30px; height:30px; background:transparent;
  border:1px solid var(--border); color:var(--dim); font-size:16px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .15s; -webkit-appearance:none; border-radius:2px; }
.oct-btn:active{ border-color:var(--gold); color:var(--gold);
  background:rgba(232,201,122,.08); }
#oct-label{ font-size:10px; letter-spacing:2px; color:var(--dim); min-width:80px; text-align:center; }

/* Sustain hint */
#sustain-hint{ position:absolute; bottom:44px; right:10px;
  font-size:9px; letter-spacing:1px; color:var(--dim); pointer-events:none; }
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="i-tag">MediaPipe · Web Audio · v2</div>
  <div class="i-title">PIANO</div>
  <div class="i-sub">Virtual Hand Instrument</div>
  <div class="i-tips">
    <b>►</b> Держи руку горизонтально перед камерой<br>
    <b>►</b> Пальцы немного согнуты вниз<br>
    <b>►</b> Быстро опускай палец = нажатие<br>
    <b>►</b> Сожми кулак = педаль сустейна
  </div>
  <button class="btn" id="btn-start">Начать</button>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="ld-txt" id="ld-txt">ЗАГРУЗКА...</div>
  <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
</div>

<!-- APP -->
<div id="app">
  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="synth-canvas"></canvas>
    <canvas id="canvas"></canvas>
    <div id="hud">
      <div class="hud-title">PIANO</div>
      <div class="hud-right">
        <div class="dot" id="hand-dot"></div>
        <span id="hand-txt">ЖДУ РУКИ</span>
        <div class="dot" id="sustain-dot"></div>
        <span id="sustain-txt">SUSTAIN</span>
      </div>
    </div>
    <div id="note-flash"></div>
  </div>
  <div id="piano-wrap">
    <canvas id="piano-canvas"></canvas>
    <div id="oct-bar">
      <button class="oct-btn" id="oct-dn">−</button>
      <span id="oct-label">C4 – C5</span>
      <button class="oct-btn" id="oct-up">+</button>
    </div>
    <div id="sustain-hint">✊ КУЛАК = SUSTAIN</div>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ═══════════════════════════════════
//  WEB AUDIO
// ═══════════════════════════════════
let audioCtx = null;
let reverbNode = null;
let sustainActive = false;
const sustainedNodes = []; // currently ringing notes during sustain

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    buildReverb();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function buildReverb() {
  // Simple impulse response reverb
  const ctx = audioCtx;
  reverbNode = ctx.createConvolver();
  const len = ctx.sampleRate * 1.8;
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
  }
  reverbNode.buffer = buf;
  reverbNode.connect(ctx.destination);
}

// velocity 0–1 based on how fast finger pressed
function playNote(freq, velocity = 0.5) {
  const ctx = getCtx();
  const now = ctx.currentTime;
  const dur  = sustainActive ? 4.0 : 1.6;
  const vol  = 0.15 + velocity * 0.75; // map velocity to volume

  // Oscillators (piano harmonics)
  const freqs   = [freq, freq*2, freq*3, freq*4.08, freq*5.02];
  const weights = [0.55, 0.22, 0.11, 0.07, 0.05];
  const master  = ctx.createGain();

  freqs.forEach((f, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.value = weights[i] * vol;
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + dur + 0.1);
  });

  // Envelope: sharp attack, exponential decay
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(vol, now + 0.006);
  master.gain.exponentialRampToValueAtTime(vol * 0.35, now + 0.08);
  master.gain.exponentialRampToValueAtTime(0.0001, now + dur);

  // Wet/dry mix
  const dryGain = ctx.createGain(); dryGain.gain.value = 0.75;
  const wetGain = ctx.createGain(); wetGain.gain.value = 0.25;
  master.connect(dryGain); dryGain.connect(ctx.destination);
  if (reverbNode) { master.connect(wetGain); wetGain.connect(reverbNode); }

  if (sustainActive) sustainedNodes.push(master);
}

// ═══════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════
const ALL   = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const WHITE = ['C','D','E','F','G','A','B'];
const BLK_AFTER = {C:'C#',D:'D#',F:'F#',G:'G#',A:'A#'};

let startOct = 4, numOct = 2;
let keys = [], keyRects = {};

function noteFreq(name, oct) {
  const midi = (oct+1)*12 + ALL.indexOf(name);
  return 440 * Math.pow(2, (midi-69)/12);
}

function buildKeys() {
  keys = [];
  for (let o=0; o<numOct; o++) {
    const oct = startOct + o;
    for (const n of ALL)
      keys.push({ id:`${n}${oct}`, name:n, octave:oct, freq:noteFreq(n,oct) });
  }
}

function layoutPiano(W, H) {
  keyRects = {};
  const whites = keys.filter(k => !k.name.includes('#'));
  const ww = W / whites.length;
  whites.forEach((k,i) => {
    keyRects[k.id] = { x:i*ww, y:0, w:ww-1, h:H, isBlack:false };
  });
  const bw = ww * 0.62, bh = H * 0.62;
  for (let o=0; o<numOct; o++) {
    const oct = startOct + o;
    WHITE.forEach((wn, wi) => {
      if (BLK_AFTER[wn]) {
        const kid = `${BLK_AFTER[wn]}${oct}`;
        const x   = (o*7 + wi) * ww + ww - bw/2;
        keyRects[kid] = { x, y:0, w:bw, h:bh, isBlack:true };
      }
    });
  }
}

function findKey(px) {
  // Check black first (priority), only X matters — hit zone is full height
  for (const [kid, r] of Object.entries(keyRects))
    if (r.isBlack && px >= r.x && px <= r.x+r.w) return kid;
  for (const [kid, r] of Object.entries(keyRects))
    if (!r.isBlack && px >= r.x && px <= r.x+r.w) return kid;
  return null;
}

// ═══════════════════════════════════
//  PIANO CANVAS
// ═══════════════════════════════════
const pianoCanvas = document.getElementById('piano-canvas');
const pCtx = pianoCanvas.getContext('2d');
let activeKeys = {}; // keyId → { time, velocity }

function resizePiano() {
  const wrap = document.getElementById('piano-wrap');
  pianoCanvas.width  = wrap.clientWidth;
  pianoCanvas.height = wrap.clientHeight - 40;
  layoutPiano(pianoCanvas.width, pianoCanvas.height);
}

function drawPiano() {
  const W = pianoCanvas.width, H = pianoCanvas.height;
  pCtx.clearRect(0, 0, W, H);
  const now = Date.now();
  const HOLD = 250;

  // White keys
  for (const [kid, r] of Object.entries(keyRects)) {
    if (r.isBlack) continue;
    const ak = activeKeys[kid];
    const active = ak && (now - ak.time < HOLD);
    const velo   = ak ? ak.velocity : 0;

    pCtx.fillStyle = active
      ? `rgba(232,${Math.round(150+velo*80)},${Math.round(50+velo*30)},1)`
      : '#ddd9cc';
    pCtx.fillRect(r.x, r.y, r.w, r.h);
    pCtx.strokeStyle = active ? 'rgba(232,201,122,.6)' : '#aaa89a';
    pCtx.lineWidth = .5;
    pCtx.strokeRect(r.x+.5, r.y+.5, r.w-1, r.h-1);

    pCtx.fillStyle = active ? '#6a3a08' : '#999';
    pCtx.font = `${Math.max(8, r.w*.28)}px 'DM Mono',monospace`;
    pCtx.textAlign = 'center';
    pCtx.fillText(kid.replace(/\d+/,''), r.x+r.w/2, r.y+r.h-5);

    if (active) {
      pCtx.shadowColor = '#e8c97a'; pCtx.shadowBlur = 14;
      pCtx.fillStyle = 'rgba(232,201,122,.25)';
      pCtx.fillRect(r.x, r.y, r.w, r.h);
      pCtx.shadowBlur = 0;
    }
  }

  // Black keys
  for (const [kid, r] of Object.entries(keyRects)) {
    if (!r.isBlack) continue;
    const ak = activeKeys[kid];
    const active = ak && (now - ak.time < HOLD);

    const g = pCtx.createLinearGradient(r.x, r.y, r.x, r.y+r.h);
    if (active) { g.addColorStop(0,'#7ab8e8'); g.addColorStop(1,'#3a78a8'); }
    else        { g.addColorStop(0,'#1e2530'); g.addColorStop(1,'#080b10'); }
    pCtx.fillStyle = g;
    pCtx.fillRect(r.x, r.y, r.w, r.h);
    pCtx.strokeStyle = active ? '#5a98c8' : '#2a3545';
    pCtx.lineWidth = 1;
    pCtx.strokeRect(r.x+.5, r.y+.5, r.w-1, r.h-1);

    if (active) {
      pCtx.shadowColor = '#7ab8e8'; pCtx.shadowBlur = 18;
      pCtx.fillStyle = 'rgba(122,184,232,.2)';
      pCtx.fillRect(r.x, r.y, r.w, r.h);
      pCtx.shadowBlur = 0;
    }
  }

  requestAnimationFrame(drawPiano);
}

// ═══════════════════════════════════
//  SYNTHESIA — falling notes
// ═══════════════════════════════════
const synthCanvas = document.getElementById('synth-canvas');
const sCtx = synthCanvas.getContext('2d');
let fallingNotes = []; // {x, w, y, h, color, vel}
const NOTE_COLORS = {
  'C':'#e87a7a','C#':'#e8a87a','D':'#e8c97a','D#':'#c9e87a',
  'E':'#7ae8a8','F':'#7ae8d8','F#':'#7ab8e8','G':'#7a88e8',
  'G#':'#a87ae8','A':'#c97ae8','A#':'#e87ac9','B':'#e87a98'
};
const FALL_SPEED = 3; // px per frame
const NOTE_HEIGHT = 18;

function spawnFallingNote(keyId, velocity) {
  const r = keyRects[keyId];
  if (!r) return;
  // Map piano canvas X to synth canvas X
  const scaleX = synthCanvas.width / pianoCanvas.width;
  const name = keyId.replace(/\d+/, '');
  fallingNotes.push({
    x: r.x * scaleX,
    w: r.w * scaleX,
    y: synthCanvas.height, // start at bottom
    h: NOTE_HEIGHT + velocity * 20,
    color: NOTE_COLORS[name] || '#e8c97a',
    alpha: 0.85,
  });
}

function drawSynthesia() {
  synthCanvas.width  = synthCanvas.offsetWidth;
  synthCanvas.height = synthCanvas.offsetHeight;
  sCtx.clearRect(0, 0, synthCanvas.width, synthCanvas.height);

  // Move notes upward
  fallingNotes = fallingNotes.filter(n => n.y + n.h > 0);
  for (const n of fallingNotes) {
    n.y -= FALL_SPEED;
    n.alpha = Math.max(0, n.alpha - 0.003);

    const r = 4;
    sCtx.beginPath();
    sCtx.roundRect
      ? sCtx.roundRect(n.x+1, n.y, n.w-2, n.h, r)
      : sCtx.rect(n.x+1, n.y, n.w-2, n.h);
    sCtx.fillStyle = n.color + Math.round(n.alpha*255).toString(16).padStart(2,'0');
    sCtx.fill();

    // Glow
    sCtx.shadowColor = n.color;
    sCtx.shadowBlur  = 8;
    sCtx.fill();
    sCtx.shadowBlur  = 0;
  }

  requestAnimationFrame(drawSynthesia);
}

// ═══════════════════════════════════
//  NOTE FLASH
// ═══════════════════════════════════
let flashTimer = null;
const noteFlash = document.getElementById('note-flash');
function showFlash(name) {
  noteFlash.textContent = name;
  noteFlash.style.opacity = '1';
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => noteFlash.style.opacity = '0', 500);
}

// ═══════════════════════════════════
//  PRESS DETECTION
// ═══════════════════════════════════
// Per-finger state
// tip indices: 8=index, 12=middle, 16=ring, 20=pinky
// mcp indices: 5=index, 9=middle, 13=ring, 17=pinky
const TIPS = [8,  12, 16, 20];
const MCPS = [5,   9, 13, 17];
// Finger natural rest length (tip-to-mcp distance, normalised)
// Used to normalise threshold per finger
const FINGER_LENGTHS = [0.25, 0.28, 0.26, 0.22]; // approx relative

const VELOCITY_WINDOW = 6;   // frames to measure velocity over
const VEL_THRESH      = 0.008; // min velocity (normalised/frame) to trigger
const POS_THRESH      = 0.035;  // AND tip must be below baseline
const RELEASE_MARGIN  = 0.015;
const COOLDOWN_MS     = 150;

// Per-finger history for velocity
const tipHistory = {}; // fid → ring buffer of {y, t}
const HIST_LEN   = 8;
const fingerDown = {}; // fid → bool
const lastPlayT  = {}; // keyId → timestamp

function initHistory(fid) {
  if (!tipHistory[fid]) tipHistory[fid] = [];
}

function recordTip(fid, y) {
  initHistory(fid);
  tipHistory[fid].push({ y, t: performance.now() });
  if (tipHistory[fid].length > HIST_LEN) tipHistory[fid].shift();
}

function getVelocity(fid) {
  const h = tipHistory[fid];
  if (!h || h.length < 3) return 0;
  // Average velocity over last N samples (dy/dt in normalised coords)
  const newest = h[h.length-1];
  const oldest = h[Math.max(0, h.length - VELOCITY_WINDOW)];
  const dt = (newest.t - oldest.t) / 1000; // seconds
  if (dt < 0.001) return 0;
  return (newest.y - oldest.y) / dt; // positive = moving down
}

// История движения всей ладони (запястье) для каждой руки
const palmHistory = {}; // hi → ring buffer

function recordPalm(hi, y) {
  if (!palmHistory[hi]) palmHistory[hi] = [];
  palmHistory[hi].push({ y, t: performance.now() });
  if (palmHistory[hi].length > HIST_LEN) palmHistory[hi].shift();
}

function getPalmVelocity(hi) {
  const h = palmHistory[hi];
  if (!h || h.length < 3) return 0;
  const newest = h[h.length-1];
  const oldest = h[Math.max(0, h.length - VELOCITY_WINDOW)];
  const dt = (newest.t - oldest.t) / 1000;
  if (dt < 0.001) return 0;
  return (newest.y - oldest.y) / dt;
}

function canPlay(keyId) {
  const now = Date.now();
  if (!lastPlayT[keyId] || now - lastPlayT[keyId] > COOLDOWN_MS) {
    lastPlayT[keyId] = now;
    return true;
  }
  return false;
}

// Sustain: fist detection — all 4 fingertips below their MCPs
function detectFist(lm) {
  let below = 0;
  for (let i=0; i<TIPS.length; i++)
    if (lm[TIPS[i]].y > lm[MCPS[i]].y + 0.02) below++;
  return below >= 3;
}

// ═══════════════════════════════════
//  MEDIAPIPE
// ═══════════════════════════════════
let landmarker = null, lastVT = -1;
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const vCtx   = canvas.getContext('2d');

function setLoad(txt, pct) {
  document.getElementById('ld-txt').textContent = txt;
  document.getElementById('ld-bar').style.width = pct + '%';
}

async function initMP() {
  setLoad('ЗАГРУЗКА MEDIAPIPE...', 15);
  const vis = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  setLoad('ЗАГРУЗКА МОДЕЛИ РУК...', 45);
  landmarker = await HandLandmarker.createFromOptions(vis, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO", numHands: 2,
    minHandDetectionConfidence: 0.6,
    minHandPresenceConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });
  setLoad('ГОТОВО', 100);
  setTimeout(() => document.getElementById('loading').style.display='none', 300);
}

async function initCam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} }, audio:false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  video.play();
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  synthCanvas.width = synthCanvas.offsetWidth;
  synthCanvas.height = synthCanvas.offsetHeight;
}

// ═══════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════
const HAND_COL = ['#7ae8b8','#e8c97a'];
const CONN = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

async function detect() {
  if (!landmarker || video.readyState < 2) { requestAnimationFrame(detect); return; }
  const vt = video.currentTime;
  if (vt === lastVT) { requestAnimationFrame(detect); return; }
  lastVT = vt;

  const res = landmarker.detectForVideo(video, performance.now());
  vCtx.clearRect(0, 0, canvas.width, canvas.height);

  const handsN = res.landmarks?.length || 0;
  document.getElementById('hand-dot').className = 'dot' + (handsN ? ' on' : '');
  document.getElementById('hand-txt').textContent = handsN ? `РУКИ: ${handsN}` : 'ЖДУ РУКИ';

  let anySustain = false;

  if (res.landmarks) {
    for (let hi=0; hi < res.landmarks.length; hi++) {
      const lm  = res.landmarks[hi];
      const col = HAND_COL[hi % 2];

      // ── Sustain: fist ──
      if (detectFist(lm)) {
        sustainActive = true;
        anySustain = true;
      }

      // ── Per-finger baseline ──
      const wristY = lm[0].y;
      const midMCP = (lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 4;
      const palmBase = (wristY * 0.4 + midMCP * 0.6);

      // Запись движения всей ладони (запястье)
      recordPalm(hi, wristY);

      // ── Draw skeleton ──
      vCtx.strokeStyle = col; vCtx.lineWidth = 1.5; vCtx.globalAlpha = 0.65;
      CONN.forEach(([a,b]) => {
        vCtx.beginPath();
        vCtx.moveTo((1-lm[a].x)*canvas.width, lm[a].y*canvas.height);
        vCtx.lineTo((1-lm[b].x)*canvas.width, lm[b].y*canvas.height);
        vCtx.stroke();
      });
      for (let i=0; i<21; i++) {
        vCtx.beginPath();
        vCtx.arc((1-lm[i].x)*canvas.width, lm[i].y*canvas.height, i===0?5:2.5, 0, Math.PI*2);
        vCtx.fillStyle = col; vCtx.globalAlpha = 0.8; vCtx.fill();
      }
      vCtx.globalAlpha = 1;

      // ── Palm baseline ──
      const baseLineY = palmBase * canvas.height;
      vCtx.beginPath();
      vCtx.moveTo(0, baseLineY); vCtx.lineTo(canvas.width, baseLineY);
      vCtx.strokeStyle = 'rgba(232,201,122,.3)';
      vCtx.lineWidth = 1; vCtx.setLineDash([5,4]); vCtx.stroke();
      vCtx.setLineDash([]);

      // ── Finger detection ──
      for (let fi=0; fi<TIPS.length; fi++) {
        const tipIdx = TIPS[fi];
        const mcpIdx = MCPS[fi];
        const fid    = `h${hi}_f${fi}`;

        const tipY = lm[tipIdx].y;
        const mcpY = lm[mcpIdx].y;

        // Per-finger: use own MCP as local baseline
        // but also weight against palm center for stability
        const fingerBase = mcpY * 0.5 + palmBase * 0.5;
        const posDepth   = tipY - fingerBase;   // position below baseline
        const tipZ       = lm[tipIdx].z;        // Z depth (negative = closer)

        recordTip(fid, tipY);

        // Относительная скорость: скорость пальца минус скорость всей руки
        // Это ключевое: если вся рука двигается вниз — не срабатывает
        const absVel     = getVelocity(fid);
        const palmVel    = getPalmVelocity(hi);
        const relVel     = absVel - palmVel; // движение пальца относительно ладони

        const wasDown = fingerDown[fid];

        // Trigger: только ОТНОСИТЕЛЬНАЯ скорость пальца + позиция ниже своего MCP
        if (!wasDown && relVel > VEL_THRESH && posDepth > POS_THRESH) {
          fingerDown[fid] = true;
          const normVel = Math.min(relVel / 0.6, 1.0);

          const px = (1 - lm[tipIdx].x) * pianoCanvas.width;
          const keyId = findKey(px);

          if (keyId && canPlay(keyId)) {
            const key = keys.find(k => k.id === keyId);
            if (key) {
              playNote(key.freq, normVel);
              activeKeys[keyId] = { time: Date.now(), velocity: normVel };
              spawnFallingNote(keyId, normVel);
              showFlash(key.name + key.octave);
            }
          }
        } else if (wasDown && posDepth < POS_THRESH - RELEASE_MARGIN) {
          fingerDown[fid] = false;
        }

        // ── Draw fingertip ──
        const tx = (1 - lm[tipIdx].x) * canvas.width;
        const ty = lm[tipIdx].y * canvas.height;
        const pressing = fingerDown[fid];

        vCtx.beginPath();
        vCtx.arc(tx, ty, pressing ? 13 : 8, 0, Math.PI*2);
        vCtx.fillStyle = pressing ? '#e8c97a' : col;
        vCtx.globalAlpha = pressing ? 0.95 : 0.55;
        vCtx.fill();

        if (pressing) {
          vCtx.beginPath();
          vCtx.arc(tx, ty, 20, 0, Math.PI*2);
          vCtx.strokeStyle = '#e8c97a'; vCtx.lineWidth = 2;
          vCtx.globalAlpha = 0.5; vCtx.stroke();
          // Velocity bar above fingertip
          const barW = 30, barH = 4;
          const vel01 = Math.min(getVelocity(fid)/0.8, 1);
          vCtx.globalAlpha = 0.8;
          vCtx.fillStyle = '#333';
          vCtx.fillRect(tx - barW/2, ty - 30, barW, barH);
          vCtx.fillStyle = `hsl(${60 + vel01*60},90%,60%)`;
          vCtx.fillRect(tx - barW/2, ty - 30, barW*vel01, barH);
        }
        vCtx.globalAlpha = 1;
      }
    }
  }

  if (!anySustain && sustainActive) {
    sustainActive = false;
    sustainedNodes.length = 0;
  }

  const sDot = document.getElementById('sustain-dot');
  const sTxt = document.getElementById('sustain-txt');
  sDot.className = 'dot' + (sustainActive ? ' sustain' : '');
  sTxt.style.color = sustainActive ? 'var(--blue)' : 'var(--dim)';

  requestAnimationFrame(detect);
}

// ═══════════════════════════════════
//  OCTAVE CONTROLS
// ═══════════════════════════════════
function updateOctLabel() {
  document.getElementById('oct-label').textContent = `C${startOct} – C${startOct+numOct-1}`;
}

document.getElementById('oct-up').addEventListener('click', () => {
  if (startOct < 6) { startOct++; buildKeys(); resizePiano(); updateOctLabel(); }
});
document.getElementById('oct-dn').addEventListener('click', () => {
  if (startOct > 2) { startOct--; buildKeys(); resizePiano(); updateOctLabel(); }
});

// ═══════════════════════════════════
//  START
// ═══════════════════════════════════
document.getElementById('btn-start').addEventListener('click', async () => {
  getCtx(); // unlock audio on gesture
  document.getElementById('intro').style.display   = 'none';
  document.getElementById('loading').style.display = 'flex';
  try {
    await Promise.all([initMP(), initCam()]);
    buildKeys(); resizePiano(); updateOctLabel();
    drawPiano(); drawSynthesia();
    document.getElementById('app').style.display = 'flex';
    detect();
  } catch(e) {
    document.getElementById('ld-txt').textContent = '❌ ' + e.message;
    console.error(e);
  }
});

window.addEventListener('resize', () => {
  canvas.width  = video.videoWidth  || canvas.width;
  canvas.height = video.videoHeight || canvas.height;
  resizePiano();
  synthCanvas.width  = synthCanvas.offsetWidth;
  synthCanvas.height = synthCanvas.offsetHeight;
});
</script>
