<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Virtual Drums v2</title>
<link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080c; --s:#0a0e14; --b:#1a2235;
  --kick:#ff4444; --snare:#ff8c00; --hihat:#00e5ff;
  --crash:#ff00ff; --ride:#ffff00; --tom1:#00ff88;
  --tom2:#ff6688; --floor:#aa88ff;
  --text:#c8d4e8; --dim:#3a4a60;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:'DM Mono',monospace;color:var(--text);touch-action:none;}

/* INTRO */
#intro{position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:100;
  background:radial-gradient(ellipse at center,#0d1520 0%,#06080c 70%);}
.i-tag{font-size:10px;letter-spacing:5px;color:var(--dim);margin-bottom:12px;}
.i-title{font-family:'Syncopate',sans-serif;font-weight:700;
  font-size:clamp(40px,12vw,80px);color:#ff4444;
  text-shadow:0 0 40px rgba(255,68,68,.4);margin-bottom:6px;}
.i-sub{font-size:10px;letter-spacing:3px;color:var(--dim);margin-bottom:32px;}
.i-tips{font-size:11px;color:var(--dim);line-height:2.4;text-align:center;margin-bottom:32px;}
.i-tips b{font-weight:400;color:var(--text);}
.btn{padding:14px 48px;background:transparent;border:1px solid #ff4444;
  color:#ff4444;font-family:'Syncopate',sans-serif;font-size:10px;
  letter-spacing:4px;cursor:pointer;-webkit-appearance:none;
  position:relative;overflow:hidden;transition:color .25s;}
.btn::before{content:'';position:absolute;inset:0;background:#ff4444;
  transform:scaleX(0);transform-origin:left;transition:transform .25s;z-index:-1;}
.btn:active::before{transform:scaleX(1);}
.btn:active{color:var(--bg);}

/* APP */
#app{position:fixed;inset:0;display:none;flex-direction:column;}
#cam-wrap{position:relative;flex:1;overflow:hidden;background:#000;}
#video{position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transform:scaleX(-1);}
#drum-canvas{position:absolute;inset:0;width:100%;height:100%;}

/* HUD top */
#hud{position:absolute;top:0;left:0;right:0;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(6,8,12,.92) 0%,transparent 100%);
  pointer-events:none;z-index:10;}
.ht{font-family:'Syncopate',sans-serif;font-size:11px;letter-spacing:3px;color:#ff4444;
  text-shadow:0 0 10px rgba(255,68,68,.4);}
.hstats{display:flex;gap:14px;}
.hstat{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.hsl{font-size:8px;letter-spacing:2px;color:var(--dim);}
.hsv{font-family:'Syncopate',sans-serif;font-size:13px;color:#ff4444;}

/* Settings panel */
#settings{position:absolute;bottom:0;left:0;right:0;
  background:rgba(6,8,12,.92);border-top:1px solid var(--b);
  padding:12px 16px;z-index:15;pointer-events:all;}
.set-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.set-row:last-child{margin-bottom:0;}
.set-lbl{font-size:10px;letter-spacing:2px;color:var(--dim);min-width:110px;}
.set-val{font-family:'Syncopate',sans-serif;font-size:11px;
  color:#ff4444;min-width:36px;text-align:right;}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;
  height:3px;background:var(--b);outline:none;border-radius:2px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;background:#ff4444;
  box-shadow:0 0 6px rgba(255,68,68,.6);cursor:pointer;}
input[type=range]::-moz-range-thumb{width:14px;height:14px;
  border-radius:50%;background:#ff4444;border:none;cursor:pointer;}
.set-toggle{font-size:9px;letter-spacing:2px;padding:4px 10px;
  background:transparent;border:1px solid var(--b);color:var(--dim);
  cursor:pointer;-webkit-appearance:none;transition:all .2s;}
.set-toggle.on{border-color:#ff4444;color:#ff4444;}

/* Hit display */
#hit-display{position:absolute;top:32%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Syncopate',sans-serif;font-size:clamp(18px,5vw,32px);
  letter-spacing:4px;font-weight:700;opacity:0;transition:opacity .08s;
  pointer-events:none;z-index:20;text-shadow:0 0 20px currentColor;}

/* Combo */
#combo-display{position:absolute;top:46%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Syncopate',sans-serif;font-size:clamp(11px,3vw,18px);
  letter-spacing:3px;color:#ffff00;
  text-shadow:0 0 12px rgba(255,255,0,.5);
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:20;}

/* Hand dots */
.hdot{width:6px;height:6px;border-radius:50%;background:var(--dim);
  display:inline-block;transition:all .3s;}
.hdot.on{background:#00ff88;box-shadow:0 0 7px #00ff88;}
#hand-wrap{display:flex;align-items:center;gap:6px;font-size:9px;
  letter-spacing:1px;color:var(--dim);}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="i-tag">MEDIAPIPE · WEB AUDIO v2 · AR</div>
  <div class="i-title">DRUMS</div>
  <div class="i-sub">VIRTUAL AIR KIT — MCP STRIKE</div>
  <div class="i-tips">
    Держи руки <b>над зонами</b> барабанов<br>
    Резко опускай руку — центр кулака = палочка<br>
    Рука должна <b>пересечь линию</b> зоны сверху вниз<br>

  </div>

</div>

<!-- APP -->
<div id="app">
  <div id="cam-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="drum-canvas"></canvas>

    <div id="hud">
      <div class="ht">DRUMS v2</div>
      <div class="hstats">
        <div id="hand-wrap">
          <div class="hdot" id="hd-l"></div>
          <div class="hdot" id="hd-r"></div>
          <span id="ht-hands">ЖДУ РУК</span>
        </div>
        <div class="hstat"><div class="hsl">УДАРОВ</div><div class="hsv" id="s-hits">0</div></div>
        <div class="hstat"><div class="hsl">BPM</div><div class="hsv" id="s-bpm">—</div></div>
      </div>
    </div>

    <div id="hit-display"></div>
    <div id="combo-display"></div>
  </div>

  <!-- Settings panel -->
  <div id="settings">
    <div class="set-row">
      <span class="set-lbl">ЧУВСТВИТ.</span>
      <input type="range" id="sl-thresh" min="15" max="90" value="55" step="1">
      <span class="set-val" id="val-thresh">—</span>
    </div>
    <div class="set-row">
      <span class="set-lbl">REVERB</span>
      <input type="range" id="sl-reverb" min="0" max="100" value="30" step="1">
      <span class="set-val" id="val-reverb">30%</span>
    </div>
    <div class="set-row">
      <span class="set-lbl">ЗОНЫ</span>
      <button class="set-toggle on" id="btn-zones">ПОКАЗАТЬ</button>
      <span class="set-lbl" style="min-width:auto;margin-left:auto;">ЛИНИИ</span>
      <button class="set-toggle on" id="btn-lines">ПОКАЗАТЬ</button>
    </div>
  </div>
</div>

<script type="module">
import { HandLandmarker, FilesetResolver }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

// ═══════════════════════════════════════════════════
//  SETTINGS (live-adjustable)
// ═══════════════════════════════════════════════════
const cfg = {
  velThresh:  0.30,   // 0.15–0.90
  reverbWet:  0.30,   // 0–1
  showZones:  true,
  showLines:  true,
};

// Slider wiring
const slThresh = document.getElementById('sl-thresh');
const slReverb = document.getElementById('sl-reverb');
const valThresh = document.getElementById('val-thresh');
const valReverb = document.getElementById('val-reverb');

function updateThreshLabel() {
  const sens = Math.round(100 - (cfg.velThresh - 0.15) / 0.75 * 100);
  valThresh.textContent = sens + '%';
}

slThresh.addEventListener('input', () => {
  cfg.velThresh = 0.15 + (100 - slThresh.value) / 100 * 0.75;
  updateThreshLabel();
});

slReverb.addEventListener('input', () => {
  cfg.reverbWet = slReverb.value / 100;
  valReverb.textContent = slReverb.value + '%';
  if (dryGain) dryGain.gain.value = 1 - cfg.reverbWet * 0.5;
  if (wetGain) wetGain.gain.value = cfg.reverbWet;
});

document.getElementById('btn-zones').addEventListener('click', function() {
  cfg.showZones = !cfg.showZones;
  this.textContent = cfg.showZones ? 'ПОКАЗАТЬ' : 'СКРЫТЬ';
  this.className = 'set-toggle' + (cfg.showZones ? ' on' : '');
});

document.getElementById('btn-lines').addEventListener('click', function() {
  cfg.showLines = !cfg.showLines;
  this.textContent = cfg.showLines ? 'ПОКАЗАТЬ' : 'СКРЫТЬ';
  this.className = 'set-toggle' + (cfg.showLines ? ' on' : '');
});

updateThreshLabel();

// ═══════════════════════════════════════════════════
//  AUDIO — improved synthesis + reverb
// ═══════════════════════════════════════════════════
let aCtx = null, reverbNode = null, dryGain = null, wetGain = null;

function getACtx() {
  if (!aCtx) {
    aCtx = new (window.AudioContext || window.webkitAudioContext)();
    buildReverb();
  }
  if (aCtx.state === 'suspended') aCtx.resume();
  return aCtx;
}

function buildReverb() {
  const ctx = aCtx;
  // Synthetic impulse response — room reverb
  const sampleRate = ctx.sampleRate;
  const len = sampleRate * 2.2;
  const buf = ctx.createBuffer(2, len, sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      // Exponential decay with some early reflections
      const t = i / sampleRate;
      const decay = Math.exp(-3.5 * t);
      const er = i < sampleRate * 0.02 ? (Math.random() * 2 - 1) * 0.6 : 0;
      d[i] = (Math.random() * 2 - 1) * decay + er;
    }
  }
  reverbNode = ctx.createConvolver();
  reverbNode.buffer = buf;

  dryGain = ctx.createGain(); dryGain.gain.value = 1 - cfg.reverbWet * 0.5;
  wetGain = ctx.createGain(); wetGain.gain.value = cfg.reverbWet;

  dryGain.connect(ctx.destination);
  reverbNode.connect(wetGain);
  wetGain.connect(ctx.destination);
}

function masterOut(node) {
  // Route through dry + wet reverb
  node.connect(dryGain);
  node.connect(reverbNode);
}

// Distortion curve for kick punch
function makeDistCurve(amount = 30) {
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

function playKick(vel = 0.8) {
  const ctx = getACtx(), now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.setValueAtTime(vel * 1.1, now);
  master.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
  masterOut(master);

  // Pitch sweep
  const osc = ctx.createOscillator();
  const dist = ctx.createWaveShaper();
  dist.curve = makeDistCurve(20);
  osc.frequency.setValueAtTime(160, now);
  osc.frequency.exponentialRampToValueAtTime(42, now + 0.12);
  osc.connect(dist); dist.connect(master);
  osc.start(now); osc.stop(now + 0.5);

  // Sub
  const sub = ctx.createOscillator();
  const subG = ctx.createGain();
  sub.frequency.setValueAtTime(55, now);
  sub.frequency.exponentialRampToValueAtTime(28, now + 0.08);
  subG.gain.setValueAtTime(vel * 0.7, now);
  subG.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  sub.connect(subG); subG.connect(master);
  sub.start(now); sub.stop(now + 0.3);

  // Click transient
  const click = ctx.createOscillator();
  const clickG = ctx.createGain();
  click.frequency.value = 1800;
  clickG.gain.setValueAtTime(vel * 0.3, now);
  clickG.gain.exponentialRampToValueAtTime(0.001, now + 0.012);
  click.connect(clickG); clickG.connect(master);
  click.start(now); click.stop(now + 0.012);
}

function playSnare(vel = 0.8) {
  const ctx = getACtx(), now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.setValueAtTime(vel, now);
  masterOut(master);

  // Noise body — two layers with different filter
  [{ f:3500, q:0.6, dur:0.18, vol:0.85 },
   { f:8000, q:0.4, dur:0.08, vol:0.4  }].forEach(({ f, q, dur, vol }) => {
    const bLen = Math.floor(ctx.sampleRate * dur);
    const buf  = ctx.createBuffer(1, bLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bLen; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filt = ctx.createBiquadFilter(); filt.type = 'bandpass';
    filt.frequency.value = f; filt.Q.value = q;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol * vel, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    src.connect(filt); filt.connect(g); g.connect(master);
    src.start(now); src.stop(now + dur);
  });

  // Body tone
  const osc = ctx.createOscillator();
  const oscG = ctx.createGain();
  osc.frequency.setValueAtTime(185, now);
  osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
  oscG.gain.setValueAtTime(vel * 0.55, now);
  oscG.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
  osc.connect(oscG); oscG.connect(master);
  osc.start(now); osc.stop(now + 0.1);
}

function playHihat(vel = 0.7, open = false) {
  const ctx = getACtx(), now = ctx.currentTime;
  const dur = open ? 0.40 : 0.07;
  const master = ctx.createGain();
  master.gain.setValueAtTime(vel * 0.55, now);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  masterOut(master);

  // Metallic partials (odd harmonics of ~400Hz)
  [400, 1200, 2000, 2800, 3600].forEach((f, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'square'; o.frequency.value = f;
    g.gain.value = vel * [0.3, 0.2, 0.15, 0.1, 0.08][i];
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + dur);
  });

  // Noise layer
  const bLen = Math.floor(ctx.sampleRate * dur);
  const buf  = ctx.createBuffer(1, bLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bLen; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 8000;
  const ng  = ctx.createGain();
  ng.gain.setValueAtTime(vel * 0.5, now);
  ng.gain.exponentialRampToValueAtTime(0.001, now + dur);
  src.connect(hpf); hpf.connect(ng); ng.connect(master);
  src.start(now); src.stop(now + dur);
}

function playCrash(vel = 0.8) {
  const ctx = getACtx(), now = ctx.currentTime;
  const dur = 2.0;
  const master = ctx.createGain();
  master.gain.setValueAtTime(vel * 0.7, now);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  masterOut(master);

  // Inharmonic metallic partials
  [220, 550, 880, 1320, 2200, 4400].forEach((f, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f * (1 + Math.random() * 0.02);
    g.gain.value = vel * [0.3,0.25,0.2,0.15,0.1,0.06][i];
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + dur);
  });

  // Sizzle noise
  const bLen = Math.floor(ctx.sampleRate * dur);
  const buf  = ctx.createBuffer(1, bLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bLen; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 5000;
  const ng  = ctx.createGain();
  ng.gain.setValueAtTime(vel * 0.6, now);
  ng.gain.exponentialRampToValueAtTime(0.001, now + dur);
  src.connect(hpf); hpf.connect(ng); ng.connect(master);
  src.start(now); src.stop(now + dur);
}

function playRide(vel = 0.7) {
  const ctx = getACtx(), now = ctx.currentTime;
  const dur = 1.0;
  const master = ctx.createGain();
  master.gain.setValueAtTime(vel * 0.5, now);
  master.gain.exponentialRampToValueAtTime(0.001, now + dur);
  masterOut(master);

  [540, 1080, 2160, 3240].forEach((f, i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.value = vel * [0.35,0.25,0.15,0.08][i];
    o.connect(g); g.connect(master);
    o.start(now); o.stop(now + dur);
  });

  const bLen = Math.floor(ctx.sampleRate * 0.3);
  const buf  = ctx.createBuffer(1, bLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bLen; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const bpf = ctx.createBiquadFilter();
  bpf.type = 'bandpass'; bpf.frequency.value = 9000; bpf.Q.value = 1.5;
  const ng  = ctx.createGain();
  ng.gain.setValueAtTime(vel * 0.35, now);
  ng.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  src.connect(bpf); bpf.connect(ng); ng.connect(master);
  src.start(now); src.stop(now + 0.3);
}

function playTom(freq = 180, vel = 0.8) {
  const ctx = getACtx(), now = ctx.currentTime;
  const master = ctx.createGain();
  master.gain.setValueAtTime(vel, now);
  masterOut(master);

  const osc = ctx.createOscillator();
  const g   = ctx.createGain();
  const dist = ctx.createWaveShaper();
  dist.curve = makeDistCurve(8);
  osc.frequency.setValueAtTime(freq, now);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.38, now + 0.18);
  g.gain.setValueAtTime(vel * 0.9, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  osc.connect(dist); dist.connect(g); g.connect(master);
  osc.start(now); osc.stop(now + 0.35);

  // Attack noise
  const bLen = Math.floor(ctx.sampleRate * 0.04);
  const buf  = ctx.createBuffer(1, bLen, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bLen; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = freq * 2; filt.Q.value = 1;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(vel * 0.35, now);
  ng.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
  src.connect(filt); filt.connect(ng); ng.connect(master);
  src.start(now); src.stop(now + 0.04);
}

// ═══════════════════════════════════════════════════
//  DRUM KIT
// ═══════════════════════════════════════════════════
const DRUMS = [
  { id:'hihat', label:'HI-HAT', color:'#00e5ff', rx:0.20, ry:0.26, rw:0.18, rh:0.13, sound:(v)=>playHihat(v) },
  { id:'crash', label:'CRASH',  color:'#ff00ff', rx:0.80, ry:0.26, rw:0.18, rh:0.13, sound:(v)=>playCrash(v) },
  { id:'snare', label:'SNARE',  color:'#ff8c00', rx:0.24, ry:0.50, rw:0.22, rh:0.15, sound:(v)=>playSnare(v) },
  { id:'ride',  label:'RIDE',   color:'#ffff00', rx:0.76, ry:0.50, rw:0.18, rh:0.13, sound:(v)=>playRide(v)  },
  { id:'tom1',  label:'TOM 1',  color:'#00ff88', rx:0.58, ry:0.32, rw:0.16, rh:0.12, sound:(v)=>playTom(220,v) },
  { id:'tom2',  label:'TOM 2',  color:'#ff6688', rx:0.58, ry:0.52, rw:0.16, rh:0.12, sound:(v)=>playTom(155,v) },
  { id:'floor', label:'FLOOR',  color:'#aa88ff', rx:0.76, ry:0.70, rw:0.20, rh:0.14, sound:(v)=>playTom(95,v)  },
  { id:'kick',  label:'KICK',   color:'#ff4444', rx:0.50, ry:0.80, rw:0.28, rh:0.13, sound:(v)=>playKick(v)  },
];

// ═══════════════════════════════════════════════════
//  STRIKE DETECTION — MCP centre + activation line
//
//  Strike point = centre of knuckles (avg of MCP 5,9,13,17)
//  State machine per hand:
//    IDLE → hand enters zone from ABOVE activation line
//    ARMED → hand crosses activation line downward
//    HIT  → play sound, lock until hand exits zone
//    RESET → hand leaves zone → back to IDLE
// ═══════════════════════════════════════════════════
// MCP indices
const MCP = [5, 9, 13, 17];
const COOLDOWN  = 100; // ms min between hits on same drum
const HLEN = 7;

const strikeHist  = {}; // hi → [{y,t}]
const handState   = {}; // hi → { phase:'idle'|'armed'|'hit', drumId, enterY }
const drumCooldown = {};

function getMCPcentre(lm, W, H) {
  // Average of 4 MCP knuckles — natural "head" of drumstick
  const x = MCP.reduce((s,i) => s + lm[i].x, 0) / 4;
  const y = MCP.reduce((s,i) => s + lm[i].y, 0) / 4;
  return { x: (1 - x) * W, y: y * H, yn: y };
}

function recStrike(hi, yn) {
  if (!strikeHist[hi]) strikeHist[hi] = [];
  strikeHist[hi].push({ y: yn, t: performance.now() });
  if (strikeHist[hi].length > HLEN) strikeHist[hi].shift();
}

function getStrikeVel(hi) {
  const h = strikeHist[hi];
  if (!h || h.length < 3) return 0;
  const dt = (h[h.length-1].t - h[0].t) / 1000;
  if (dt < 0.001) return 0;
  return (h[h.length-1].y - h[0].y) / dt;
}

function drumBounds(d, W, H) {
  return {
    cx: d.rx * W, cy: d.ry * H,
    hw: d.rw * W / 2, hh: d.rh * H / 2,
    // activation line = top of zone
    lineY: (d.ry - d.rh / 2) * H,
  };
}

function inZone(sx, sy, d, W, H) {
  const { cx, cy, hw, hh } = drumBounds(d, W, H);
  return sx >= cx-hw && sx <= cx+hw && sy >= cy-hh && sy <= cy+hh;
}

function processHand(hi, lm, W, H) {
  const { x: sx, y: sy, yn } = getMCPcentre(lm, W, H);
  recStrike(hi, yn);
  const vel = getStrikeVel(hi);

  // Simple but reliable:
  // Strike = velocity spike downward + hand in zone + cooldown
  // No state machine — just velocity threshold
  const drum = DRUMS.find(d => inZone(sx, sy, d, W, H));

  const state = handState[hi] || { phase: 'idle', lastVel: 0 };
  handState[hi] = state;

  if (drum && vel > cfg.velThresh) {
    const now = Date.now();
    if (!drumCooldown[drum.id] || now - drumCooldown[drum.id] > COOLDOWN) {
      // Extra check: velocity must be local peak (was lower before)
      if (vel >= state.lastVel * 0.7) {
        drumCooldown[drum.id] = now;
        const normVel = Math.min(vel / 1.2, 1.0);
        drum.sound(0.35 + normVel * 0.65);
        flashDrum(drum.id);
        spawnRipple(sx, sy, drum.color);
        onHit(drum, normVel);
        state.phase = 'hit';
      }
    }
  } else if (!drum || vel < cfg.velThresh * 0.3) {
    state.phase = 'idle';
  }

  state.lastVel = vel;
  return { sx, sy, vel, drum, state };
}

// ═══════════════════════════════════════════════════
//  VISUAL EFFECTS
// ═══════════════════════════════════════════════════
const ripples    = [];
const drumFlashM = {};

function spawnRipple(x, y, color) {
  ripples.push({ x, y, r: 0, color, alpha: 0.95 });
}

function flashDrum(id) {
  drumFlashM[id] = 1.0;
}

function drawRipples(ctx) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += 4.5; r.alpha -= 0.032;
    if (r.alpha <= 0) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = r.color + Math.round(r.alpha * 255).toString(16).padStart(2,'0');
    ctx.lineWidth = 2.5;
    ctx.shadowColor = r.color; ctx.shadowBlur = 8;
    ctx.stroke(); ctx.shadowBlur = 0;
  }
}

function drawKit(ctx, W, H) {
  if (!cfg.showZones && !cfg.showLines) return;

  for (const d of DRUMS) {
    const { cx, cy, hw, hh, lineY } = drumBounds(d, W, H);
    const fa = drumFlashM[d.id] || 0;
    if (fa > 0) drumFlashM[d.id] = Math.max(0, fa - 0.07);

    if (cfg.showZones) {
      // Fill
      ctx.beginPath();
      ctx.ellipse(cx, cy, hw, hh, 0, 0, Math.PI * 2);
      ctx.fillStyle = d.color + Math.round((0.14 + fa * 0.55) * 255).toString(16).padStart(2,'0');
      ctx.fill();

      // Border
      ctx.beginPath();
      ctx.ellipse(cx, cy, hw, hh, 0, 0, Math.PI * 2);
      const ba = 0.45 + fa * 0.55;
      ctx.strokeStyle = d.color + Math.round(ba * 255).toString(16).padStart(2,'0');
      ctx.lineWidth = 1.5 + fa * 2.5;
      if (fa > 0.05) { ctx.shadowColor = d.color; ctx.shadowBlur = 12 + fa * 20; }
      ctx.stroke(); ctx.shadowBlur = 0;

      // Inner ring
      ctx.beginPath();
      ctx.ellipse(cx, cy, hw * 0.6, hh * 0.6, 0, 0, Math.PI * 2);
      ctx.strokeStyle = d.color + '35';
      ctx.lineWidth = 1; ctx.stroke();

      // Label
      ctx.fillStyle = d.color + Math.round((0.65 + fa * 0.35) * 255).toString(16).padStart(2,'0');
      ctx.font = `${Math.max(8, Math.min(12, hw * 0.26))}px 'Syncopate',sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (fa > 0.05) { ctx.shadowColor = d.color; ctx.shadowBlur = 7; }
      ctx.fillText(d.label, cx, cy);
      ctx.shadowBlur = 0;
    }

    if (cfg.showLines) {
      // Activation line — horizontal line across full zone width
      ctx.beginPath();
      ctx.moveTo(cx - hw, lineY);
      ctx.lineTo(cx + hw, lineY);
      const la = 0.35 + fa * 0.65;
      ctx.strokeStyle = d.color + Math.round(la * 255).toString(16).padStart(2,'0');
      ctx.lineWidth = 1.5 + fa;
      ctx.setLineDash([4, 3]);
      if (fa > 0.1) { ctx.shadowColor = d.color; ctx.shadowBlur = 6; }
      ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0;
    }
  }
}

function drawHands(ctx, results, W, H) {
  const lms = results.landmarks || [];
  const COLS = ['#00ff88', '#ff6688'];

  for (let hi = 0; hi < lms.length; hi++) {
    const lm  = lms[hi];
    const col = COLS[hi % 2];
    const { sx, sy, vel, state } = processHand(hi, lm, W, H);
    const isHit = state.phase === 'hit';
    const isArmed = state.phase === 'armed';

    // Skeleton (subtle)
    ctx.strokeStyle = col; ctx.lineWidth = 1.2; ctx.globalAlpha = 0.4;
    CONN.forEach(([a,b]) => {
      ctx.beginPath();
      ctx.moveTo((1-lm[a].x)*W, lm[a].y*H);
      ctx.lineTo((1-lm[b].x)*W, lm[b].y*H);
      ctx.stroke();
    });
    ctx.globalAlpha = 1;

    // MCP strike point
    const r = isHit ? 16 : isArmed ? 13 : 9;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = isHit ? '#ffffff' : isArmed ? col : col;
    ctx.globalAlpha = isHit ? 1 : isArmed ? 0.9 : 0.65;
    ctx.fill();

    if (isArmed || isHit) {
      ctx.beginPath(); ctx.arc(sx, sy, r + 7, 0, Math.PI*2);
      ctx.strokeStyle = isHit ? '#ffffff' : col;
      ctx.lineWidth = 2; ctx.globalAlpha = 0.5; ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Velocity bar
    const bw = 32, bh = 3;
    const vn = Math.min(Math.max(vel / 1.2, 0), 1);
    ctx.fillStyle = 'rgba(0,0,0,.6)';
    ctx.fillRect(sx - bw/2, sy - 26, bw, bh);
    ctx.fillStyle = vn > 0.65 ? '#ff4444' : vn > 0.35 ? '#ff8c00' : '#00ff88';
    ctx.fillRect(sx - bw/2, sy - 26, bw * vn, bh);
  }
}

// ═══════════════════════════════════════════════════
//  HIT STATS
// ═══════════════════════════════════════════════════
let totalHits = 0, combo = 0, lastHitT = 0;
const hitTimes = [];
let hitTimer = null;

function onHit(drum, vel) {
  totalHits++;
  const now = Date.now();
  combo = (now - lastHitT < 1400) ? combo + 1 : 1;
  lastHitT = now;

  hitTimes.push(now);
  if (hitTimes.length > 8) hitTimes.shift();
  if (hitTimes.length >= 4) {
    const diffs = hitTimes.slice(1).map((t,i) => t - hitTimes[i]);
    const avg   = diffs.reduce((a,b)=>a+b,0) / diffs.length;
    const bpm   = Math.round(60000 / avg);
    if (bpm > 30 && bpm < 400) document.getElementById('s-bpm').textContent = bpm;
  }

  document.getElementById('s-hits').textContent = totalHits;

  const hd = document.getElementById('hit-display');
  hd.textContent = drum.label;
  hd.style.color = drum.color;
  hd.style.textShadow = `0 0 18px ${drum.color},0 0 36px ${drum.color}55`;
  hd.style.opacity = '1';
  clearTimeout(hitTimer);
  hitTimer = setTimeout(() => hd.style.opacity = '0', 320);

  if (combo >= 4) {
    const cb = document.getElementById('combo-display');
    cb.textContent = `${combo}× COMBO`;
    cb.style.opacity = '1';
    clearTimeout(window._comboT);
    window._comboT = setTimeout(() => cb.style.opacity = '0', 750);
  }
}

// ═══════════════════════════════════════════════════
//  MEDIAPIPE + RENDER
// ═══════════════════════════════════════════════════
const CONN = [
  [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
];

let mp = null, lastVT = -1;
const video  = document.getElementById('video');
const canvas = document.getElementById('drum-canvas');
const ctx    = canvas.getContext('2d');

async function initMP() {
  const vis = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  mp = await HandLandmarker.createFromOptions(vis, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO", numHands: 2,
    minHandDetectionConfidence: 0.6,
    minHandPresenceConfidence: 0.6,
    minTrackingConfidence: 0.55,
  });
}

async function initCam() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width:{ideal:1280}, height:{ideal:720} }, audio: false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  video.play();
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
}

function loop() {
  if (!mp || video.readyState < 2) { requestAnimationFrame(loop); return; }
  const vt = video.currentTime;
  if (vt !== lastVT) {
    lastVT = vt;
    const res = mp.detectForVideo(video, performance.now());
    render(res);
  }
  requestAnimationFrame(loop);
}

function render(res) {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  drawKit(ctx, W, H);
  drawRipples(ctx);

  const lms = res.landmarks || [];
  const n = lms.length;

  document.getElementById('hd-l').className = 'hdot' + (n > 0 ? ' on' : '');
  document.getElementById('hd-r').className = 'hdot' + (n > 1 ? ' on' : '');
  document.getElementById('ht-hands').textContent =
    n === 0 ? 'ЖДУ РУК' : n === 1 ? '1 РУКА' : '2 РУКИ';

  // Reset state for hands that disappeared
  for (const hi of Object.keys(handState)) {
    if (parseInt(hi) >= n) { handState[hi] = { phase: 'idle' }; }
  }

  if (n > 0) drawHands(ctx, res, W, H);
}

// ═══════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════
document.getElementById('btn-go').addEventListener('click', async () => {
  getACtx();
  try {
    await Promise.all([initMP(), initCam()]);
    document.getElementById('intro').style.display = 'none';
    document.getElementById('app').style.display   = 'flex';
    loop();
  } catch(e) {
    alert('Ошибка камеры: ' + e.message);
  }
});

window.addEventListener('resize', () => {
  canvas.width  = video.videoWidth  || canvas.width;
  canvas.height = video.videoHeight || canvas.height;
});
</script>
